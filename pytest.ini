[pytest]
pythonpath =
    src
    .
testpaths =
    tests
python_files =
    test_*.py
addopts =
    # Windows sandbox denies access to the default %TEMP%\pytest-of-* base
    # (WinError 5); keep pytest's tmp_path under a repo-local, gitignored dir.
    --basetemp=.pytest_tmp
    # Same sandbox denial hits the .pytest_cache writes (warning-only noise).
    -p no:cacheprovider
norecursedirs =
    .review
    dist
markers =
    integration: exercises the real pipeline end to end (touches storage)
