name: p71-public-live-probe

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: p71-public-live-probe-${{ github.ref }}
  cancel-in-progress: true

jobs:
  public-readonly-probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pinned dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install -e ".[dev]"

      - name: Run Extended public read-only live probe
        id: probe
        shell: bash
        run: |
          set +e
          mkdir -p storage/p71/manual_public_probe
          python scripts/run_p71_extended_public_probe.py \
            --network-enabled \
            --timeout-seconds 35 \
            --output storage/p71/manual_public_probe/public_evidence.json
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload redacted public evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: p71-public-readonly-evidence
          path: storage/p71/manual_public_probe/public_evidence.json
          if-no-files-found: error
          retention-days: 7

      - name: Preserve fail-closed probe result
        shell: bash
        run: exit "${{ steps.probe.outputs.exit_code }}"
