name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHONPATH: src:.
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas numpy requests PyYAML python-dotenv pytest

      - name: Compile the kept tree
        run: >-
          python -m compileall -q
          src config core collectors builders risk bridge data_health run_pipeline.py

      - name: Unit + integration tests
        run: python -m pytest -q

      - name: Pipeline smoke (one cycle)
        # Exit 0 (trade placed) and 2 (no-trade cycle) are both healthy (P0-6);
        # only safety-halt/error codes (10/20/30/50) should fail CI.
        run: |
          set +e
          python run_pipeline.py
          code=$?
          set -e
          echo "run_pipeline.py exit code: $code"
          case "$code" in
            0|2) echo "healthy (0=trade placed, 2=no-trade cycle)";;
            *) echo "unhealthy exit code $code"; exit "$code";;
          esac

      - name: Safety flag guard (no order/live/testnet enabled by default)
        run: python scripts/check_safety_defaults.py
