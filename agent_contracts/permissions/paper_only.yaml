permission_tier: paper_only
purpose: Paper-stage artifact review and paper evidence analysis only.
allowed_actions:
  - read_artifacts
  - validate_contracts
  - summarize_paper_evidence
  - produce_paper_review_output
forbidden_actions:
  - mutate_runtime
  - mutate_settings_yaml
  - mutate_score_weights
  - read_api_key_values
  - read_api_secret_values
  - read_secret_files
  - create_secret_files
  - enable_place_order
  - enable_cancel_order
  - enable_signed_order_executor
  - submit_testnet_orders
  - submit_live_orders
  - auto_promote_signed_testnet
  - auto_promote_live
